<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronómetro de entrenamiento</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:40px;
}

#cronometro{
    font-size:70px;
    font-weight:bold;
    margin:30px 0;
}

button{
    font-size:22px;
    padding:12px 28px;
    margin:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#resultado{
    margin-top:25px;
    font-size:22px;
}
</style>

</head>
<body>

<h1>Cronómetro</h1>

<div id="cronometro">0.000</div>

<button onclick="iniciar()">Iniciar</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="marcar()">Pulsar</button>

<div id="resultado">
    <p>Última pulsación: <span id="marca">-</span></p>
    <p>Diferencia con 10.700 s: <span id="error">-</span></p>
</div>

<script>

let inicio=0;
let intervalo=null;
let pitido=false;

const beep=new Audio("beep.mp3");

function iniciar(){

    if(intervalo) return;

    // Desbloquea el audio en iPhone
    beep.play().then(()=>{
        beep.pause();
        beep.currentTime=0;
    }).catch(()=>{});

    inicio=performance.now();
    pitido=false;

    intervalo=setInterval(()=>{

        const t=(performance.now()-inicio)/1000;

        document.getElementById("cronometro").textContent=t.toFixed(3);

        if(!pitido && t>=10.700){

            pitido=true;

            beep.currentTime=0;
            beep.play();

        }

    },10);

}

function reiniciar(){

    clearInterval(intervalo);
    intervalo=null;

    document.getElementById("cronometro").textContent="0.000";
    document.getElementById("marca").textContent="-";
    document.getElementById("error").textContent="-";

}

function marcar(){

    if(!intervalo) return;

    const t=(performance.now()-inicio)/1000;

    document.getElementById("marca").textContent=t.toFixed(3)+" s";

    const diferencia=t-10.700;

    if(diferencia>=0){
        document.getElementById("error").textContent=
        "+"+diferencia.toFixed(3)+" s";
    }else{
        document.getElementById("error").textContent=
        diferencia.toFixed(3)+" s";
    }

}

</script>

</body>
</html>
