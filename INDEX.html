<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cronómetro de entrenamiento</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    margin-top:60px;
}

#cronometro{
    font-size:72px;
    font-weight:bold;
    margin:30px;
}

button{
    font-size:20px;
    padding:12px 24px;
    margin:8px;
    cursor:pointer;
}

#resultado{
    margin-top:25px;
    font-size:24px;
}
</style>
</head>

<body>

<h1>Cronómetro</h1>

<div id="cronometro">0.000</div>

<button onclick="iniciar()">Iniciar</button>
<button onclick="reiniciar()">Reiniciar</button>
<button onclick="marcar()">Pulsar</button>

<div id="resultado">
    <p>Última pulsación: <span id="marca">-</span></p>
    <p>Diferencia con 10.700 s: <span id="error">-</span></p>
</div>

<script>

let inicio=0;
let intervalo=null;
let audioCtx=null;
let pitido=false;

function iniciar(){

    if(intervalo) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    inicio=performance.now();
    pitido=false;

    intervalo=setInterval(()=>{

        const t=(performance.now()-inicio)/1000;

        document.getElementById("cronometro").textContent=t.toFixed(3);

        if(!pitido && t>=10.700){

            pitido=true;

            const osc=audioCtx.createOscillator();
            const gain=audioCtx.createGain();

            osc.frequency.value=1000;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();

            gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(
                0.0001,
                audioCtx.currentTime+0.25
            );

            osc.stop(audioCtx.currentTime+0.25);
        }

    },10);

}

function reiniciar(){

    clearInterval(intervalo);
    intervalo=null;

    document.getElementById("cronometro").textContent="0.000";
    document.getElementById("marca").textContent="-";
    document.getElementById("error").textContent="-";

}

function marcar(){

    if(!intervalo) return;

    const t=(performance.now()-inicio)/1000;

    document.getElementById("marca").textContent=t.toFixed(3)+" s";

    const diferencia=t-10.700;

    if(diferencia>0){
        document.getElementById("error").textContent=
        "+"+diferencia.toFixed(3)+" s";
    }else{
        document.getElementById("error").textContent=
        diferencia.toFixed(3)+" s";
    }

}

</script>

</body>
</html>
